[workspace]
members = [".", "tauri-plugin-privacysuite"]
resolver = "2"

[package]
name = "privacysuite-core-sdk"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
description = "Zero-knowledge cryptographic foundation for BoomLeft applications"
authors = ["BoomLeft LLC"]
license = "Proprietary"
repository = "https://github.com/mkfnch/PrivacySuite-Core-SDK"
publish = false

[dependencies]
# --- Crypto primitives (existing) ---
argon2 = { version = "0.5", default-features = false, features = ["std"] }
chacha20poly1305 = { version = "0.10", default-features = false, features = ["std"] }
zeroize = { version = "1.7", features = ["derive"] }
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }
sha2 = { version = "0.10", default-features = false, features = ["std"] }
hmac = { version = "0.12", default-features = false }
pbkdf2 = { version = "0.12", default-features = false, features = ["hmac"] }
subtle = { version = "2", default-features = false }

# --- Device pairing + signing ---
x25519-dalek = { version = "2", features = ["static_secrets"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
blake3 = "1"
base64 = "0.22"

# --- Encrypted storage ---
rusqlite = { version = "0.32", features = ["bundled-sqlcipher"] }

# --- CRDT sync ---
automerge = "0.5"

# --- OPAQUE authentication ---
opaque-ke = "3"

# --- Privacy networking + sync ---
tokio = { version = "1", features = ["rt", "net", "io-util", "sync", "time", "macros"] }
hickory-resolver = { version = "0.24", features = ["dns-over-https-rustls", "tokio-runtime"] }
tokio-tungstenite = { version = "0.21", features = ["native-tls"] }
futures-util = { version = "0.3", default-features = false, features = ["sink"] }
tokio-native-tls = "0.3"
arti-client = { version = "0.25", default-features = false, features = ["tokio", "native-tls"] }
tor-rtcompat = { version = "0.25", features = ["tokio", "native-tls"] }

# --- Serialization ---
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# --- Certificate pinning ---
rustls = { version = "0.23", default-features = false }
webpki = { version = "0.22", features = ["std"] }

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"
missing_debug_implementations = "deny"
unreachable_pub = "deny"
unused_results = "deny"
elided_lifetimes_in_paths = "warn"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
mem_forget = "deny"
large_stack_arrays = "warn"
indexing_slicing = "warn"
pedantic = { level = "warn", priority = -1 }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
overflow-checks = true

[profile.dev]
overflow-checks = true
debug = true
